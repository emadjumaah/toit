<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntentText Converter — HTML, Markdown ↔ IntentText (.it)</title>

    <meta
      name="description"
      content="Convert between HTML, Markdown, and IntentText (.it). Runs entirely in your browser — no uploads, no tracking."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://toit-psi.vercel.app/" />
    <meta
      property="og:title"
      content="IntentText Converter — HTML, Markdown ↔ .it"
    />
    <meta
      property="og:description"
      content="Convert between HTML, Markdown, and IntentText. Browser-only — no uploads."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="IntentText Converter" />
    <meta
      name="twitter:description"
      content="Convert between HTML, Markdown, and IntentText. Browser-only — no uploads."
    />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header>
        <div class="header-left">
          <h1>Intent<span>Text</span></h1>
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="web-to-it">
              Web → .it
            </button>
            <button class="mode-btn" data-mode="it-to-web">.it → Web</button>
          </div>
        </div>
        <div class="header-right">
          <button class="btn" id="example-btn">Example</button>
          <span class="badge">v1.3</span>
          <a
            href="https://github.com/emadjumaah/IntentText"
            target="_blank"
            rel="noopener"
            >GitHub</a
          >
          <a
            href="https://www.npmjs.com/package/@intenttext/core"
            target="_blank"
            rel="noopener"
            >npm</a
          >
        </div>
      </header>

      <!-- Two-panel workspace -->
      <div class="panels">
        <!-- LEFT: Input panel -->
        <div class="panel" id="input-panel">
          <div class="panel-header">
            <!-- web-to-it input tabs -->
            <div class="tabs" id="wti-input-tabs">
              <button class="tab-btn active" data-tab="pane-html-input">
                HTML
              </button>
              <button class="tab-btn" data-tab="pane-md-input">Markdown</button>
            </div>
            <!-- it-to-web input tabs -->
            <div class="tabs" id="itw-input-tabs" hidden>
              <button class="tab-btn active" data-tab="pane-it-input">
                .it Source
              </button>
              <button class="tab-btn" data-tab="pane-it-input-preview">
                Preview
              </button>
            </div>
            <div class="panel-actions">
              <button class="btn" id="clear-btn">Clear</button>
            </div>
          </div>

          <!-- web-to-it: HTML input -->
          <div class="tab-pane active" id="pane-html-input" data-mode="wti">
            <div
              id="html-editor"
              class="html-editor"
              contenteditable="true"
              spellcheck="false"
              role="textbox"
              aria-label="HTML input"
              aria-multiline="true"
            ></div>
          </div>

          <!-- web-to-it: Markdown input -->
          <div class="tab-pane" id="pane-md-input" data-mode="wti">
            <textarea
              id="md-input-area"
              class="md-editor"
              spellcheck="false"
              placeholder="Type or paste Markdown here…"
              aria-label="Markdown input"
            ></textarea>
          </div>

          <!-- it-to-web: IT source input (Monaco) -->
          <div class="tab-pane" id="pane-it-input" data-mode="itw">
            <div id="it-input-editor" class="monaco-container"></div>
          </div>

          <!-- it-to-web: IT preview -->
          <div class="tab-pane" id="pane-it-input-preview" data-mode="itw">
            <div id="input-preview" class="preview-area">
              <p class="preview-empty">
                Preview will appear here once you add content…
              </p>
            </div>
          </div>
        </div>

        <!-- RIGHT: Output panel -->
        <div class="panel" id="output-panel">
          <div class="panel-header">
            <!-- web-to-it output tabs -->
            <div class="tabs" id="wti-output-tabs">
              <button class="tab-btn active" data-tab="pane-it-output">
                .it Source
              </button>
              <button class="tab-btn" data-tab="pane-it-output-preview">
                Preview
              </button>
            </div>
            <!-- it-to-web output tabs -->
            <div class="tabs" id="itw-output-tabs" hidden>
              <button class="tab-btn active" data-tab="pane-html-output">
                HTML
              </button>
              <button class="tab-btn" data-tab="pane-md-output">
                Markdown
              </button>
            </div>
            <div class="panel-actions">
              <button class="btn" id="copy-btn">Copy</button>
              <button class="btn primary" id="download-btn">
                Download .it
              </button>
            </div>
          </div>

          <!-- web-to-it: IT source output (Monaco, readonly) -->
          <div class="tab-pane active" id="pane-it-output" data-mode="wti">
            <div id="it-output-editor" class="monaco-container"></div>
          </div>

          <!-- web-to-it: IT preview -->
          <div class="tab-pane" id="pane-it-output-preview" data-mode="wti">
            <div id="output-preview" class="preview-area">
              <p class="preview-empty">
                Preview will appear here once you add content…
              </p>
            </div>
          </div>

          <!-- it-to-web: HTML output -->
          <div class="tab-pane" id="pane-html-output" data-mode="itw">
            <div
              id="html-output-content"
              class="html-output preview-area"
            ></div>
          </div>

          <!-- it-to-web: Markdown output -->
          <div class="tab-pane" id="pane-md-output" data-mode="itw">
            <textarea
              id="md-output-area"
              class="md-editor"
              readonly
              placeholder="Markdown output will appear here…"
            ></textarea>
          </div>

          <div class="stats-bar" id="stats-bar">
            0 blocks · 0 lines · 0 chars
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
